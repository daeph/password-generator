# Aktualisierte Version mit v4/v5 Actions
name: Check Code Quality with flake8

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # ✅ Aktuelle Version (v4 statt v3)
      - name: Set up Python
        uses: actions/setup-python@v5  # ✅ Aktuelle Version (v5 statt v4)
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 .